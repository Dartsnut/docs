<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="icon" href="{{ '/assets/images/favicon.ico' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">
    <script src="{{ '/assets/js/code-copy.js' | relative_url }}" defer></script>
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <a class="brand" href="{{ '/' | relative_url }}" aria-label="Dartsnut Docs home">
          <span class="brand-mark">D</span>
          <span class="brand-text">DARTSNUT</span>
        </a>

        <nav class="site-nav" aria-label="Primary navigation">
          <a class="{% if page.url == '/' %}active{% endif %}" href="{{ '/' | relative_url }}">Home</a>
          <span class="nav-section">Firmware</span>
          <a class="{% if page.url contains '/firmware/prepare-sd-card/' %}active{% endif %}" href="{{ '/firmware/prepare-sd-card/' | relative_url }}">Prepare SD Card</a>
          <a class="{% if page.url contains '/firmware/app-interaction/' %}active{% endif %}" href="{{ '/firmware/app-interaction/' | relative_url }}">App Interaction</a>
          <span class="nav-section">Emulator</span>
          <a class="{% if page.url contains '/emulator-agent/workspace-handling/' %}active{% endif %}" href="{{ '/emulator-agent/workspace-handling/' | relative_url }}">Workspace Handling</a>
          <a class="{% if page.url contains '/emulator-agent/emulator-control/' %}active{% endif %}" href="{{ '/emulator-agent/emulator-control/' | relative_url }}">Emulator Control</a>
          <a class="{% if page.url contains '/emulator-agent/deploy-to-machine/' %}active{% endif %}" href="{{ '/emulator-agent/deploy-to-machine/' | relative_url }}">Deploy To Machine</a>
          <a class="{% if page.url contains '/emulator-agent/submit-for-review/' %}active{% endif %}" href="{{ '/emulator-agent/submit-for-review/' | relative_url }}">Submit For Review</a>
          <span class="nav-section">Agent</span>
          <a class="{% if page.url contains '/agent/codex-claude-plugins/' %}active{% endif %}" href="{{ '/agent/codex-claude-plugins/' | relative_url }}">Codex/Claude Plugins</a>
          <a class="{% if page.url contains '/agent/skills-for-other-agents/' %}active{% endif %}" href="{{ '/agent/skills-for-other-agents/' | relative_url }}">Skills For Other Agents</a>
          <a class="{% if page.url contains '/agent/mcp-for-other-agents/' %}active{% endif %}" href="{{ '/agent/mcp-for-other-agents/' | relative_url }}">MCP For Other Agents</a>
        </nav>
      </aside>

      <div class="main">
        <main class="page-shell">
          {{ content }}
        </main>

        <footer class="site-footer">
          <span>Dartsnut organization documentation</span>
          <a href="https://github.com/Dartsnut/docs">GitHub</a>
        </footer>
      </div>
    </div>
  </body>
</html>
